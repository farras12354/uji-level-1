<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./src/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="relative flex items-center justify-between px-4 sm:px-8 py-4 bg-gray-900">
    <a href="index.html">
      <h1 id="brand-title" class="text-yellow-400 text-2xl font-bold">Toko Online</h1>
    </a>
    <ul class="hidden md:flex gap-8 absolute left-1/2 -translate-x-1/2">
      <li><a href="index.html" class="text-white hover:text-yellow-400 transition-colors">Home</a></li>
      <li><a href="#" class="text-white hover:text-yellow-400 transition-colors">Kategori</a></li>
      <li><a href="contact.html" class="text-white hover:text-yellow-400 transition-colors">Contact</a></li>
    </ul>
    <div class="flex items-center gap-4">
      <button class="text-gray-400 hover:text-yellow-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
      </button>
      <a href="#" onclick="requireLogin(event, 'Keranjang.html')" class="text-yellow-400 transition-colors relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
        </svg>
      </a>
      <button id="hamburger" class="md:hidden text-gray-400 hover:text-yellow-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <button onclick="logout()" class="text-sm font-medium bg-yellow-400 hover:bg-yellow-500 text-black px-4 py-1.5 rounded-lg transition-colors">Logout</button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden bg-gray-800 px-4 py-4 flex flex-col gap-4">
    <a href="index.html" class="text-white hover:text-yellow-400 transition-colors">Home</a>
    <a href="#" class="text-white hover:text-yellow-400 transition-colors">Kategori</a>
    <a href="contact.html" class="text-white hover:text-yellow-400 transition-colors">Contact</a>
  </div>

  <script>
    document.getElementById("hamburger").addEventListener("click", () => {
      const menu = document.getElementById("mobile-menu");
      menu.classList.toggle("hidden");
      menu.classList.toggle("flex");
    });
  </script>

  <!-- Breadcrumb -->
  <div class="px-8 py-4 text-sm text-gray-500">
    <a href="index.html" class="hover:text-yellow-500">Home</a>
    <span class="mx-2">/</span>
    <span class="text-gray-700">Keranjang</span>
  </div>

  <!-- Content -->
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-12 flex flex-col md:flex-row gap-6 items-start">

    <!-- Kiri: List Produk -->
    <div class="flex-1">
      <h2 class="text-xl font-bold text-gray-800 mb-4">Keranjang Belanja</h2>
      <div id="list-keranjang" class="flex flex-col gap-4">
        <p class="text-gray-400">Memuat produk...</p>
      </div>
    </div>

    <!-- Kanan: Order Summary -->
    <div class="w-full md:w-80 bg-white rounded-2xl shadow p-6 shrink-0">
      <h2 class="text-lg font-bold text-gray-800 mb-5">Order Summary</h2>
      <div class="flex flex-col gap-4 text-sm text-gray-600">
        <div class="flex justify-between">
          <span class="text-gray-500 text-xs">Harga Satuan</span>
          <span id="harga-satu" class="text-gray-600 text-xs">$0.00</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500 text-xs">Subtotal</span>
          <span id="subtotal" class="text-gray-600 text-xs">$0.00</span>
        </div>
        <div class="border-t pt-4 flex justify-between text-base font-bold text-gray-900">
          <span>Total</span>
          <span id="total" class="text-green-500 text-xl">$0.00</span>
        </div>
      </div>
      <div class="mt-6 flex flex-col gap-3">
        <button onclick="checkout()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition-colors">
          Proceed to Checkout
        </button>
        <button onclick="hapusSemua()" class="w-full text-center border border-red-300 hover:bg-red-50 text-red-500 font-medium py-3 rounded-xl transition-colors">
          Hapus Semua
        </button>
      </div>
      <p class="text-xs text-gray-400 text-center mt-4 flex items-center justify-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        Secure Checkout Guaranteed
      </p>
    </div>

  </div>

  <!-- Modal Sukses -->
  <div id="modal-sukses" style="display:none" class="fixed inset-0  backdrop-blur-md p-6 rounded-xlbg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full mx-4 text-center">
      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900 mb-2">Checkout Berhasil!</h2>
      <p id="modal-nama" class="text-gray-500 text-sm mb-2">Terima kasih sudah berbelanja</p>
      <p id="modal-total" class="text-green-500 font-bold text-lg mb-6">Total: $0.00</p>
      <button href="index.html" onclick="tutupModal()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-semibold py-2.5 rounded-xl transition-colors">
        Kembali Belanja
      </button>
    </div>
  </div>

  <script src="./js/Keranjang.js"></script>
  <script>
    function logout() {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }

    function tutupModal() {
      document.getElementById("modal-sukses").style.display = "none";
    }

    function checkout() {
      const user = localStorage.getItem("user");
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      let total = 0;
      Object.values(produkData).forEach((p) => {
        const checkbox = document.getElementById(`check-${p.id}`);
        if (checkbox && checkbox.checked) total += p.price * qty[p.id];
      });

      if (total === 0) {
        alert("Pilih produk yang ingin di-checkout!");
        return;
      }

      let nama = "Pelanggan";
      try {
        nama = JSON.parse(user).nama || "Pelanggan";
      } catch {}

      // Tampilkan modal
      document.getElementById("modal-nama").textContent = `Terima kasih, ${nama}! Pesananmu sedang diproses.`;
      document.getElementById("modal-total").textContent = `Total: ${formatRupiah(total)}`;
      document.getElementById("modal-sukses").style.display = "flex";

      // Kosongkan keranjang
      localStorage.removeItem("keranjang");
      produkData = {};
      qty = {};
      renderList();
    }
  </script>
</body>
</html>
