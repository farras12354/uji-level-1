<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./src/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Navbar -->
  <nav class="relative flex items-center justify-between px-8 py-4 bg-gray-900">
    <a href="index.html">
      <h1 id="brand-title" class="text-yellow-400 text-2xl font-bold">zhafstore</h1>
    </a>
    <ul class="hidden md:flex gap-8 absolute left-1/2 -translate-x-1/2">
      <li><a href="index.html" class="text-white hover:text-yellow-400 transition-colors">Home</a></li>
      <li><a href="#" class="text-white hover:text-yellow-400 transition-colors">Kategori</a></li>
      <li><a href="contact.html" class="text-white hover:text-yellow-400 transition-colors">Contact</a></li>
    </ul>
    <div class="flex items-center gap-4">
      <button class="text-gray-400 hover:text-yellow-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
      </button>
      <a href="#" onclick="requireLogin(event, 'Keranjang.html')" class="text-gray-400 hover:text-yellow-400 transition-colors relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
        </svg>
      </a>
      <button id="hamburger" class="md:hidden text-gray-400 hover:text-yellow-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden bg-gray-800 md:hidden px-6 py-4 flex flex-col gap-4">
    <a href="index.html" class="text-white hover:text-yellow-400 transition-colors">Home</a>
    <a href="#" class="text-white hover:text-yellow-400 transition-colors">Kategori</a>
    <a href="contact.html" class="text-white hover:text-yellow-400 transition-colors">Contact</a>
  </div>

  <script>
    document.getElementById("hamburger").addEventListener("click", () => {
      document.getElementById("mobile-menu").classList.toggle("hidden");
    });
  </script>

  <!-- Breadcrumb -->
  <div class="px-8 py-4 text-sm text-gray-500">
    <a href="index.html" class="hover:text-gray-500">Home</a>
    <span class="mx-2">/</span>
    <span id="breadcrumb-title" class="text-gray-700">Detail Produk</span>
  </div>

  <!-- Detail Produk -->
  <div id="detail-produk" class="max-w-5xl mx-auto px-8 py-6">
    <p class="text-gray-500">Memuat detail produk...</p>
  </div>
  
  <div id="cointainer"></div>

  <script src="./js/detail.js"></script>
  <script>
    const brandTitle = document.getElementById("brand-title");
    if (brandTitle && localStorage.getItem("user")) {
      brandTitle.textContent = "ShopEase";
    }
  </script>
</body>
</html>
